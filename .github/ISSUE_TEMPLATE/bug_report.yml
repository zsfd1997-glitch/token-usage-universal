name: Bug report
description: Report a reproducible bug in token collection, reporting, or repository workflows.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you are running the project
      placeholder: macOS 15, Python 3.11, python3 scripts/token_usage.py report --today
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and input
      description: Exact command, flags, or natural language trigger you used
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant output from health, sources, diagnose, or tests. Redact secrets.
      render: shell
    validations:
      required: false
