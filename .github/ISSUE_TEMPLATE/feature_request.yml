name: Feature request
description: Suggest a new adapter, workflow, or product improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or source details
      description: Mention source IDs, sample log shapes, default paths, or product docs if relevant
    validations:
      required: false
