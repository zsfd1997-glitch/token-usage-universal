name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s scripts -t . -p 'test_*.py'
      - name: Smoke test CLI help
        run: python scripts/token_usage.py --help
      - name: Smoke test health
        run: python scripts/token_usage.py health --format json
